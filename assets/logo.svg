<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="110" viewBox="0 0 1400 110" role="img" aria-labelledby="title desc">
  <title id="title">XR-UCalib Logo</title>
  <desc id="desc">Gradient text logo for XR-UCalib.</desc>

  <defs>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="52%" stop-color="#0072FF"/>
      <stop offset="100%" stop-color="#7F00FF"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-50%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.48  0 0 0 0 1  0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <text
    x="700"
    y="103"
    text-anchor="middle"
    font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="116"
    font-weight="900"
    letter-spacing="2"
    fill="url(#gradText)"
    filter="url(#glow)">
    XR-UCalib
  </text>
</svg>
